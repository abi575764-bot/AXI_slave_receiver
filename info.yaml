project:
title:        "AXI Lite Slave Receiver"
author:       "Abishek"
discord:      ""
description:  "A simplified AXI4-Lite slave receiver that stores incoming write data in an internal register and displays it on the outputs."
language:     "Verilog"
clock_hz:     100000000

tiles: "1x1"

top_module:  "tt_um_example"

source_files:
- "project.v"

pinout:

# Inputs

ui[0]: "AWVALID"
ui[1]: "WVALID"
ui[2]: "BREADY"
ui[3]: "AWADDR[0]"
ui[4]: "AWADDR[1]"
ui[5]: "AWADDR[2]"
ui[6]: "AWADDR[3]"
ui[7]: "AWADDR[4]"

# Outputs

uo[0]: "DATA_OUT[0]"
uo[1]: "DATA_OUT[1]"
uo[2]: "DATA_OUT[2]"
uo[3]: "DATA_OUT[3]"
uo[4]: "DATA_OUT[4]"
uo[5]: "DATA_OUT[5]"
uo[6]: "DATA_OUT[6]"
uo[7]: "DATA_OUT[7]"

# Bidirectional pins

uio[0]: "WDATA[0]"
uio[1]: "WDATA[1]"
uio[2]: "WDATA[2]"
uio[3]: "WDATA[3]"
uio[4]: "WDATA[4]"
uio[5]: "WDATA[5]"
uio[6]: "WDATA[6]"
uio[7]: "WDATA[7]"

yaml_version: 6
